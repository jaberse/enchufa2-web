<svg viewBox="0 0 900 520" width="900" height="520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: Inter, system-ui, -apple-system, sans-serif; }
      .title { font-size: 15px; font-weight: 600; fill: #111111; }
      .subtitle { font-size: 11px; fill: #666666; font-weight: 400; }
      .part-label { font-size: 10px; fill: #444444; font-weight: 400; }
      .part-label-bold { font-size: 10px; fill: #111111; font-weight: 600; }
      .count { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
      .count-label { font-size: 11px; font-weight: 500; fill: #666666; }
      .vs-text { font-size: 18px; font-weight: 700; fill: #999999; }
      .source { font-size: 9px; fill: #999999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#FAFAF8" rx="8"/>

  <!-- ═══ LEFT: Motor de combustión ═══ -->
  <text x="225" y="36" class="title" text-anchor="middle">Motor de combustión</text>

  <!-- Engine block (central body) -->
  <rect x="160" y="180" width="130" height="90" rx="6" fill="#E8E8E6" stroke="#CCCCCC" stroke-width="1.5"/>
  <!-- Cylinder head -->
  <rect x="170" y="155" width="110" height="30" rx="4" fill="#D4D4D0" stroke="#BBBBBB" stroke-width="1"/>
  <!-- Cylinders inside block -->
  <rect x="175" y="190" width="22" height="55" rx="2" fill="#C0C0BC" stroke="#AAAAAA" stroke-width="0.8"/>
  <rect x="202" y="190" width="22" height="55" rx="2" fill="#C0C0BC" stroke="#AAAAAA" stroke-width="0.8"/>
  <rect x="229" y="190" width="22" height="55" rx="2" fill="#C0C0BC" stroke="#AAAAAA" stroke-width="0.8"/>
  <rect x="256" y="190" width="22" height="55" rx="2" fill="#C0C0BC" stroke="#AAAAAA" stroke-width="0.8"/>

  <!-- Pistons (exploded upward) -->
  <g opacity="0.9">
    <!-- Piston 1 -->
    <rect x="173" y="95" width="26" height="18" rx="3" fill="#888884" stroke="#777773" stroke-width="1"/>
    <line x1="186" y1="113" x2="186" y2="155" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- Piston 2 -->
    <rect x="200" y="80" width="26" height="18" rx="3" fill="#888884" stroke="#777773" stroke-width="1"/>
    <line x1="213" y1="98" x2="213" y2="155" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- Piston 3 -->
    <rect x="227" y="95" width="26" height="18" rx="3" fill="#888884" stroke="#777773" stroke-width="1"/>
    <line x1="240" y1="113" x2="240" y2="155" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- Piston 4 -->
    <rect x="254" y="80" width="26" height="18" rx="3" fill="#888884" stroke="#777773" stroke-width="1"/>
    <line x1="267" y1="98" x2="267" y2="155" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Crankshaft (exploded below) -->
  <g opacity="0.9">
    <rect x="155" y="295" width="140" height="14" rx="4" fill="#999995" stroke="#888884" stroke-width="1"/>
    <!-- Crank throws -->
    <circle cx="190" cy="302" r="8" fill="#777773" stroke="#666662" stroke-width="1"/>
    <circle cx="225" cy="302" r="8" fill="#777773" stroke="#666662" stroke-width="1"/>
    <circle cx="260" cy="302" r="8" fill="#777773" stroke="#666662" stroke-width="1"/>
    <line x1="225" y1="270" x2="225" y2="290" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Camshaft (exploded top-right) -->
  <g opacity="0.9">
    <rect x="310" y="95" width="80" height="10" rx="3" fill="#AAAAAA" stroke="#999999" stroke-width="1"/>
    <!-- Cam lobes -->
    <ellipse cx="330" cy="100" rx="6" ry="8" fill="#999999"/>
    <ellipse cx="350" cy="100" rx="6" ry="8" fill="#999999"/>
    <ellipse cx="370" cy="100" rx="6" ry="8" fill="#999999"/>
    <line x1="310" y1="105" x2="290" y2="155" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Timing chain/belt (exploded left) -->
  <g opacity="0.9">
    <path d="M85,140 L85,220 Q85,235 95,235 L105,235 Q115,235 115,220 L115,140 Q115,125 105,125 L95,125 Q85,125 85,140 Z" fill="none" stroke="#AAAAAA" stroke-width="2.5"/>
    <circle cx="100" cy="132" r="8" fill="none" stroke="#BBBBBB" stroke-width="1.5"/>
    <circle cx="100" cy="228" r="10" fill="none" stroke="#BBBBBB" stroke-width="1.5"/>
    <line x1="115" y1="180" x2="160" y2="200" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Exhaust manifold (exploded right) -->
  <g opacity="0.9">
    <path d="M340,190 Q360,190 370,200 Q380,210 380,225 L380,245" stroke="#BBBBBB" stroke-width="3" fill="none"/>
    <path d="M340,210 Q355,210 365,220 Q375,230 375,245" stroke="#BBBBBB" stroke-width="3" fill="none"/>
    <path d="M340,230 Q350,230 358,238 Q365,245 365,255" stroke="#BBBBBB" stroke-width="3" fill="none"/>
    <!-- Catalytic converter -->
    <rect x="355" y="255" width="40" height="22" rx="8" fill="#D0D0CC" stroke="#BBBBBB" stroke-width="1"/>
    <line x1="290" y1="220" x2="340" y2="215" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Oil pan (exploded below) -->
  <g opacity="0.9">
    <rect x="165" y="335" width="120" height="16" rx="4" fill="#C8C8C4" stroke="#AAAAAA" stroke-width="1"/>
    <line x1="225" y1="270" x2="225" y2="335" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Alternator (exploded bottom-left) -->
  <g opacity="0.9">
    <circle cx="95" cy="310" r="18" fill="#D8D8D4" stroke="#BBBBBB" stroke-width="1.5"/>
    <circle cx="95" cy="310" r="8" fill="#C0C0BC" stroke="#AAAAAA" stroke-width="1"/>
    <line x1="113" y1="310" x2="160" y2="260" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Starter motor (exploded bottom-right) -->
  <g opacity="0.9">
    <rect x="340" y="310" width="32" height="18" rx="5" fill="#D8D8D4" stroke="#BBBBBB" stroke-width="1.5"/>
    <circle cx="356" cy="319" r="6" fill="#C0C0BC"/>
    <line x1="340" y1="315" x2="290" y2="270" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Labels ICE -->
  <text x="186" y="88" class="part-label" text-anchor="middle">Pistones</text>
  <text x="350" y="88" class="part-label" text-anchor="middle">Árbol de levas</text>
  <text x="100" y="115" class="part-label" text-anchor="middle">Correa</text>
  <text x="100" y="104" class="part-label" text-anchor="middle">distribución</text>
  <text x="375" y="290" class="part-label" text-anchor="middle">Catalizador</text>
  <text x="225" y="365" class="part-label" text-anchor="middle">Cárter de aceite</text>
  <text x="95" y="340" class="part-label" text-anchor="middle">Alternador</text>
  <text x="356" y="340" class="part-label" text-anchor="middle">Motor arranque</text>
  <text x="225" y="320" class="part-label" text-anchor="middle">Cigüeñal</text>

  <!-- Count ICE -->
  <text x="225" y="420" class="count" fill="#444444" text-anchor="middle">+2.000</text>
  <text x="225" y="438" class="count-label" text-anchor="middle">piezas móviles</text>

  <!-- ═══ CENTER DIVIDER ═══ -->
  <line x1="450" y1="55" x2="450" y2="460" stroke="#E0E0E0" stroke-width="1"/>
  <text x="450" y="250" class="vs-text" text-anchor="middle">vs</text>

  <!-- ═══ RIGHT: Motor eléctrico ═══ -->
  <text x="675" y="36" class="title" text-anchor="middle">Motor eléctrico</text>

  <!-- Stator (outer ring) -->
  <circle cx="675" cy="210" r="65" fill="#E8E8E6" stroke="#CCCCCC" stroke-width="1.5"/>
  <!-- Stator windings -->
  <circle cx="675" cy="210" r="55" fill="none" stroke="#D0D0CC" stroke-width="8" stroke-dasharray="12,6"/>

  <!-- Rotor (inner) -->
  <circle cx="675" cy="210" r="32" fill="#D4D4D0" stroke="#BBBBBB" stroke-width="1.5"/>
  <!-- Rotor shaft -->
  <rect x="660" y="175" width="30" height="70" rx="4" fill="#C0C0BC" stroke="#AAAAAA" stroke-width="1"/>
  <!-- Magnets on rotor -->
  <rect x="652" y="185" width="8" height="15" rx="1" fill="#F5C518" opacity="0.7"/>
  <rect x="690" y="185" width="8" height="15" rx="1" fill="#F5C518" opacity="0.7"/>
  <rect x="652" y="215" width="8" height="15" rx="1" fill="#F5C518" opacity="0.7"/>
  <rect x="690" y="215" width="8" height="15" rx="1" fill="#F5C518" opacity="0.7"/>
  <!-- Center bore -->
  <circle cx="675" cy="210" r="10" fill="#FAFAF8" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Shaft (exploded below) -->
  <g opacity="0.9">
    <rect x="665" y="300" width="20" height="60" rx="4" fill="#AAAAAA" stroke="#999999" stroke-width="1"/>
    <line x1="675" y1="275" x2="675" y2="300" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Bearings (exploded sides) -->
  <g opacity="0.9">
    <!-- Bearing left -->
    <circle cx="565" cy="210" r="14" fill="none" stroke="#CCCCCC" stroke-width="3"/>
    <circle cx="565" cy="210" r="7" fill="#D8D8D4" stroke="#BBBBBB" stroke-width="1"/>
    <line x1="579" y1="210" x2="610" y2="210" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- Bearing right -->
    <circle cx="785" cy="210" r="14" fill="none" stroke="#CCCCCC" stroke-width="3"/>
    <circle cx="785" cy="210" r="7" fill="#D8D8D4" stroke="#BBBBBB" stroke-width="1"/>
    <line x1="771" y1="210" x2="740" y2="210" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Inverter (exploded top) -->
  <g opacity="0.9">
    <rect x="640" y="85" width="70" height="35" rx="5" fill="#F5C518" opacity="0.15" stroke="#F5C518" stroke-width="1.5"/>
    <text x="675" y="107" font-family="Inter, sans-serif" font-size="10" fill="#B8960F" font-weight="600" text-anchor="middle">DC → AC</text>
    <line x1="675" y1="120" x2="675" y2="145" stroke="#F5C518" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  </g>

  <!-- Reduction gear (single-speed, exploded bottom-right) -->
  <g opacity="0.9">
    <circle cx="770" cy="320" r="20" fill="none" stroke="#CCCCCC" stroke-width="2"/>
    <!-- Gear teeth suggestion -->
    <circle cx="770" cy="320" r="20" fill="none" stroke="#DDDDDD" stroke-width="4" stroke-dasharray="3,5"/>
    <circle cx="770" cy="320" r="10" fill="#E0E0DC" stroke="#CCCCCC" stroke-width="1"/>
    <line x1="755" y1="305" x2="720" y2="275" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Labels EV -->
  <text x="675" y="78" class="part-label" text-anchor="middle">Inversor</text>
  <text x="565" y="190" class="part-label" text-anchor="middle">Rodamiento</text>
  <text x="785" y="190" class="part-label" text-anchor="middle">Rodamiento</text>
  <text x="675" y="378" class="part-label" text-anchor="middle">Eje de transmisión</text>
  <text x="770" y="350" class="part-label" text-anchor="middle">Reductor</text>
  <text x="675" y="255" class="part-label" text-anchor="middle">Estátor + Rotor</text>

  <!-- Highlight: no oil, no exhaust, no timing -->
  <g opacity="0.8">
    <text x="540" y="320" class="part-label" text-anchor="middle" fill="#999999">Sin aceite</text>
    <text x="540" y="335" class="part-label" text-anchor="middle" fill="#999999">Sin escape</text>
    <text x="540" y="350" class="part-label" text-anchor="middle" fill="#999999">Sin embrague</text>
    <text x="540" y="365" class="part-label" text-anchor="middle" fill="#999999">Sin distribución</text>
  </g>

  <!-- Count EV -->
  <text x="675" y="420" class="count" fill="#F5C518" text-anchor="middle">~20</text>
  <text x="675" y="438" class="count-label" text-anchor="middle">piezas móviles</text>

  <!-- ═══ Bottom comparison bar ═══ -->
  <!-- ICE bar -->
  <rect x="50" y="465" width="380" height="8" rx="4" fill="#DDDDDD"/>
  <text x="240" y="490" class="subtitle" text-anchor="middle">Aceite, filtros, bujías, correa, embrague, escape…</text>

  <!-- EV bar (proportional: 20/2000 = 1%) -->
  <rect x="470" y="465" width="4" height="8" rx="2" fill="#F5C518"/>
  <text x="660" y="490" class="subtitle" text-anchor="middle">Rodamientos, refrigerante cada 4-6 años</text>

  <!-- Source -->
  <text x="450" y="510" class="source" text-anchor="middle">Fuente: Toyota Motor Corporation, datos técnicos de referencia. Diagrama: enchufa2, 2026.</text>
</svg>