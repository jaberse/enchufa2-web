<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" width="700" height="420">
  <defs>
    <style>
      .chart-title { font-family: 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 500; fill: #111111; }
      .axis-label { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #666666; }
      .data-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #111111; }
      .legend-label { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #111111; }
      .callout-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 500; fill: #111111; }
      .callout-value { font-family: 'Inter', system-ui, sans-serif; font-size: 18px; font-weight: 700; fill: #111111; }
      .grid-line { stroke: #E8E8E6; stroke-width: 0.8; }
      .ev-line { stroke: #F5C518; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .ice-line { stroke: #666666; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!--
    Chart data (base scenario: 15.000 km/año, carga mixta €0,186/kWh):
    Year 0: ë-C3 €19.300 · C3 €17.011
    Year 1: €20.580 · €19.341
    Year 2: €21.860 · €21.671
    Year 3: €23.139 · €24.001
    Year 4: €24.419 · €26.331
    Year 5: €25.699 · €28.661
    Crossover: year ~2.18 at €22.090
    Final savings: €2.963

    Chart area: x=85..640 (555px for 5 years = 111px/year)
    Y scale: €15k..€30k over y=70..320 (250px / 15k = 16.667 px per €1k)
    y(value_k) = 320 - (value_k - 15) * 16.667
  -->

  <!-- Title -->
  <text x="85" y="30" class="chart-title">TCO acumulado: Citroën ë-C3 vs C3 gasolina</text>
  <text x="85" y="48" class="axis-label">Escenario base: 15.000 km/año, carga mixta (80 % casa + 20 % rápida)</text>

  <!-- Y-axis gridlines (€15k, €20k, €25k, €30k) -->
  <line x1="85" y1="320" x2="640" y2="320" class="grid-line"/>
  <line x1="85" y1="236.67" x2="640" y2="236.67" class="grid-line"/>
  <line x1="85" y1="153.33" x2="640" y2="153.33" class="grid-line"/>
  <line x1="85" y1="70" x2="640" y2="70" class="grid-line"/>

  <!-- Y-axis labels -->
  <text x="77" y="325" class="axis-label" text-anchor="end">€15k</text>
  <text x="77" y="241" class="axis-label" text-anchor="end">€20k</text>
  <text x="77" y="158" class="axis-label" text-anchor="end">€25k</text>
  <text x="77" y="74" class="axis-label" text-anchor="end">€30k</text>

  <!-- Axes -->
  <line x1="85" y1="70" x2="85" y2="320" stroke="#111111" stroke-width="1"/>
  <line x1="85" y1="320" x2="640" y2="320" stroke="#111111" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="85" y="340" class="axis-label" text-anchor="middle">Año 0</text>
  <text x="196" y="340" class="axis-label" text-anchor="middle">Año 1</text>
  <text x="307" y="340" class="axis-label" text-anchor="middle">Año 2</text>
  <text x="418" y="340" class="axis-label" text-anchor="middle">Año 3</text>
  <text x="529" y="340" class="axis-label" text-anchor="middle">Año 4</text>
  <text x="640" y="340" class="axis-label" text-anchor="middle">Año 5</text>

  <!-- Savings area (between the two lines, from crossover ~year 2.18 to year 5) -->
  <polygon
    points="328,201.83 418,184.33 529,163 640,141.67 640,92.33 529,131.17 418,170 328,201.83"
    fill="#F5C518" opacity="0.18"/>

  <!-- C3 line (ICE - gray, upper line after crossover) -->
  <polyline points="85,286.5 196,247.67 307,208.83 418,170 529,131.17 640,92.33" class="ice-line"/>

  <!-- ë-C3 line (EV - yellow, lower line after crossover) -->
  <polyline points="85,248.33 196,227 307,205.67 418,184.33 529,163 640,141.67" class="ev-line"/>

  <!-- Data points: C3 -->
  <circle cx="85" cy="286.5" r="3.5" fill="#666666"/>
  <circle cx="196" cy="247.67" r="3.5" fill="#666666"/>
  <circle cx="307" cy="208.83" r="3.5" fill="#666666"/>
  <circle cx="418" cy="170" r="3.5" fill="#666666"/>
  <circle cx="529" cy="131.17" r="3.5" fill="#666666"/>
  <circle cx="640" cy="92.33" r="3.5" fill="#666666"/>

  <!-- Data points: ë-C3 -->
  <circle cx="85" cy="248.33" r="3.5" fill="#F5C518"/>
  <circle cx="196" cy="227" r="3.5" fill="#F5C518"/>
  <circle cx="307" cy="205.67" r="3.5" fill="#F5C518"/>
  <circle cx="418" cy="184.33" r="3.5" fill="#F5C518"/>
  <circle cx="529" cy="163" r="3.5" fill="#F5C518"/>
  <circle cx="640" cy="141.67" r="3.5" fill="#F5C518"/>

  <!-- Start labels (year 0, left side) -->
  <text x="95" y="252" class="data-label" fill="#B8860B">€19,3k</text>
  <text x="95" y="290" class="data-label" fill="#666666">€17,0k</text>

  <!-- End labels (year 5, right side with arrows away from data points) -->
  <text x="630" y="136" class="data-label" fill="#B8860B" text-anchor="end">ë-C3 €25,7k</text>
  <text x="630" y="86" class="data-label" fill="#666666" text-anchor="end">C3 €28,7k</text>

  <!-- Crossover annotation -->
  <circle cx="328" cy="201.83" r="5" fill="none" stroke="#111111" stroke-width="1.5"/>
  <line x1="328" y1="207" x2="328" y2="218" stroke="#111111" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="328" y="232" class="axis-label" fill="#111111" text-anchor="middle" font-weight="600" font-size="10.5">Cruce año 2-3</text>

  <!-- Savings callout (inside savings area, year 4.3 position) -->
  <text x="560" y="195" class="callout-value" fill="#111111" text-anchor="middle">€2.963</text>
  <text x="560" y="213" class="callout-label" fill="#666666" text-anchor="middle">ahorro a 5 años</text>

  <!-- Legend (below chart) -->
  <g transform="translate(85, 368)">
    <rect x="0" y="-8" width="16" height="3" fill="#F5C518" rx="1"/>
    <text x="22" y="-4" class="legend-label">Citroën ë-C3 (eléctrico)</text>
    <rect x="210" y="-8" width="16" height="3" fill="#666666" rx="1"/>
    <text x="232" y="-4" class="legend-label">Citroën C3 (gasolina)</text>
    <rect x="408" y="-11" width="12" height="9" fill="#F5C518" opacity="0.2" rx="1"/>
    <text x="426" y="-4" class="legend-label">Área de ahorro</text>
  </g>

  <!-- Source -->
  <text x="85" y="405" class="axis-label" font-size="10" fill="#999999">Fuente: cálculos enchufa2 · abril 2026 · PVP con subvención Plan Auto+ aplicada</text>
</svg>
